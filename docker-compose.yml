# Local/production-style stack for Canvus.
#
#   docker compose up --build
#
# Browser → web (3000) and api (4000) on localhost.
# web → api server-to-server over the internal network (http://api:4000).
# api → postgres + redis on the internal network.
#
# Secrets (POSTGRES_PASSWORD, INTERNAL_API_KEY, AUTH_SECRET) are REQUIRED: compose
# aborts with an error if they are unset rather than falling back to a guessable
# default. Provide them in a root .env file (gitignored) — see .env.example.
# Non-secret settings still default to sensible local values.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required - set a strong value in the root .env}
      POSTGRES_DB: ${POSTGRES_DB:-canvus}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-canvus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?required - must match between web and api}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required - set a strong value in the root .env}@postgres:5432/${POSTGRES_DB:-canvus}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?required - set a strong value in the root .env}@postgres:5432/${POSTGRES_DB:-canvus}?schema=public
      ENABLE_GUEST_CANVASES: ${ENABLE_GUEST_CANVASES:-true}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle — must be reachable from the browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      # Server-to-server (BFF) base URL — uses the internal compose network.
      API_BASE_URL: http://api:4000
      AUTH_SECRET: ${AUTH_SECRET:?required - generate with npx auth secret}
      AUTH_TRUST_HOST: "true"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?required - must match between web and api}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
